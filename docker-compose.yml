services:
  app:
    build: .
    image: open-refinery:latest
    environment:
      # SECRET_KEY is the only must-set. Override in .env for real deployments.
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/open-refinery.db}
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - or-data:/data
    # ponytail: --help until the server exists; flips to ["serve"] at 0.3.0.
    command: ["--help"]

volumes:
  or-data:
